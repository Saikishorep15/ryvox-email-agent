name: ryvox-email-env
version: 1.0.0

description: >
  Email classification RL environment for spam, important, and normal emails.

entry_point: server.app:main
env_class: environment:RyvoxEmailEnvironment

engine: fastapi
port: 7860

# 🔹 ACTION SPACE
action_space:
  type: discrete
  actions:
    - spam
    - important
    - normal

# 🔹 OBSERVATION SPACE
observation_space:
  type: object
  properties:
    email_text:
      type: string
    reward:
      type: float
    done:
      type: boolean
    task:           # 🔥 ADD THIS
      type: string

# 🔥 FIXED TASKS (VALID RANGE)
tasks:
  - id: spam_detection  # Change 'name' to 'id'
    description: Detect spam emails
    grader:
      type: reward
      min: 0.1
      max: 0.9

  - id: priority_detection  # Change 'name' to 'id'
    description: Detect important emails
    grader:
      type: reward
      min: 0.1
      max: 0.9

  - id: normal_classification  # Change 'name' to 'id'
    description: Detect normal emails
    grader:
      type: reward
      min: 0.1
      max: 0.9

# 🔹 EVALUATION
evaluation:
  metric: average_reward
  episodes: 5
  success_threshold: 0.5

# 🔹 REPRODUCIBILITY
reproducibility:
  seed: 42
  deterministic: true