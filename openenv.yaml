name: ryvox-email-env
version: 1.0.0

description: >
  A real-world email classification RL environment where an agent learns to classify
  emails into spam, important, or normal using reward-based feedback.

entry_point: app:app
env_class: environment:RyvoxEmailEnvironment

engine: fastapi
port: 7860

# 🔹 ACTION SPACE
action_space:
  type: discrete
  actions:
    - spam
    - important
    - normal

# 🔹 OBSERVATION SPACE
observation_space:
  type: object
  properties:
    email_text:
      type: string
    reward:
      type: float
    done:
      type: boolean

# 🔹 TASK DEFINITIONS (IMPORTANT FOR JUDGES ⭐)
tasks:
  - name: easy_classification
    difficulty: easy
    description: Identify obvious spam or normal emails
    reward_range: [0.0, 0.3]

  - name: medium_classification
    difficulty: medium
    description: Identify promotional or slightly ambiguous emails
    reward_range: [0.0, 0.6]

  - name: hard_classification
    difficulty: hard
    description: Identify subtle important emails like reports or discussions
    reward_range: [0.0, 1.0]

# 🔹 REWARD LOGIC (VERY IMPORTANT ⭐)
reward:
  description: >
    Reward is given based on classification accuracy and difficulty level.
    Correct classification yields higher reward for harder tasks.
    Partial reward is given for semantically correct guesses.
    Wrong classification may give negative reward.

  range: [0.0, 1.0]

# 🔹 EVALUATION
evaluation:
  metric: average_reward
  episodes: 5
  success_threshold: 0.5

# 🔹 REPRODUCIBILITY
reproducibility:
  seed: 42
  deterministic: true